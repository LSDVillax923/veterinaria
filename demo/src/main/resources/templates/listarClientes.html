<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Cliente</title>
  <link rel="stylesheet" th:href="@{/css/clientes-form.css}">
</head>
<body>
<main>
  <div class="form-card">
    <h2>✏ Editar cliente</h2>

    <form th:action="@{/clientes/{id}/editar(id=${cliente.id})}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" th:value="${cliente.nombre}" required>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" th:value="${cliente.apellido}" required>
        </div>

        <div class="form-group full-width">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" th:value="${cliente.correo}" required>
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input type="text" id="celular" name="celular" th:value="${cliente.celular}" required>
        </div>

        <div class="form-group">
          <label for="contrasenia">Contraseña</label>
          <input type="password" id="contrasenia" name="contrasenia" th:value="${cliente.contrasenia}" required>
        </div>
      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
        <a th:href="@{/clientes}" class="btn-cancelar">✕ Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
