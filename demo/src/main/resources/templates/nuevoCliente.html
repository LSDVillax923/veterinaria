<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Cliente</title>
  <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>
<header class="header">
  <div class="header-container">
    <a th:href="@{/inicio}" class="logo">
      <img th:src="@{/img/Medicat.png}" alt="Medicat logo">
    </a>
    <nav class="nav">
      <a th:href="@{/inicio}" class="nav-link">Inicio</a>
      <a th:href="@{/clientes}" class="nav-link">Clientes</a>
    </nav>
  </div>
</header>

<main class="dashboard">
  <section class="dashboard-header">
    <a th:href="@{/clientes}" class="btn-volver">← Volver al listado</a>
    <h1 class="dashboard-title">Registrar Cliente</h1>
    <p class="dashboard-subtitle">Agrega un nuevo propietario al sistema</p>
  </section>

  <div class="form-card">

    <form th:action="@{/clientes/nuevo}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" required>
        </div>

        <div class="form-group full-width">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" required>
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input type="text" id="celular" name="celular" required>
        </div>

        <div class="form-group">
          <label for="contrasenia">Contraseña</label>
          <input type="password" id="contrasenia" name="contrasenia" required>
        </div>
      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar"> Guardar Cliente</button>
        <a th:href="@{/clientes}" class="btn-cancelar">✕ Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
