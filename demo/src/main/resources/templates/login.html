<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="container">
  <div class="left">
    <img th:src="@{/img/gato1.jpg}" alt="Gato mirando" class="img">
    <div class="text">
      <h1>Bienvenido de nuevo</h1>
      <p>Accede a tu cuenta para gestionar el cuidado de tus mascotas</p>
    </div>
  </div>
  <div class="right">
    <a th:href="@{/inicio}" class="back">← Volver al inicio</a>
    <h2>Iniciar Sesión</h2>
    <p>Ingresa tus credenciales para continuar</p>
    <form th:action="@{/inicio/login}" method="post">
      <label for="email">Correo Electrónico</label>
      <input type="email" id="email" name="email" placeholder="tu@email.com" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>

      <div class="row">
        <label>
          <input type="checkbox" name="remember"> Recordarme
        </label>
        <a th:href="@{/inicio/forgot-password}">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit">Iniciar Sesión</button>
    </form>
    <p class="register">
      ¿No tienes cuenta?
      <a th:href="@{/inicio/registro}">Regístrate aquí</a>
    </p>

<p th:if="${mensaje}" th:text="${mensaje}" style="color: green;"></p>
<p th:if="${error}"   th:text="${error}"   style="color: red;"></p>

</div>
</div>
</body>
</html>
