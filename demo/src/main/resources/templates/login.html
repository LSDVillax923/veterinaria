<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- BOOTSTRAP ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- ESTILOS PERSONALIZADOS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body class="bg-body-custom">

<!-- =========================
        CONTENEDOR PRINCIPAL
========================== -->
<main class="container-fluid vh-100 d-flex align-items-center justify-content-center">

    <div class="row login-wrapper shadow-lg overflow-hidden rounded-4">

        <!-- =========================
                COLUMNA IZQUIERDA
        ========================== -->
        <section class="col-lg-6 d-none d-lg-block p-0 position-relative">

            <img th:src="@{../img/gato.jpg}"
                 alt="Gato"
                 class="img-overlay w-100 h-100">

            <div class="overlay-text">
                <h1 class="fw-bold text-white">
                    Bienvenido de nuevo
                </h1>
                <p class="text-white-50 mb-0">
                    Accede a tu cuenta para gestionar el cuidado de tus mascotas
                </p>
            </div>

        </section>

        <!-- =========================
                COLUMNA DERECHA
        ========================== -->
        <section class="col-lg-6 col-12 bg-white p-5">

            <!-- Volver -->
            <header class="mb-4">
                <a th:href="@{/inicio}"
                   class="text-decoration-none text-teal">
                    <i class="bi bi-arrow-left"></i>
                    Volver al inicio
                </a>
            </header>

            <!-- Título -->
            <div class="text-center mb-4">
                <img th:src="@{../img/Medicat.png}"
                     alt="Logo"
                     width="60"
                     class="mb-3">

                <h2 class="fw-bold text-teal">
                    Iniciar Sesión
                </h2>

                <p class="text-muted">
                    Ingresa tus credenciales para continuar
                </p>
            </div>

            <!-- =========================
                    FORMULARIO
            ========================== -->
            <form th:action="@{/inicio/login}"
                  method="post"
                  class="needs-validation"
                  novalidate>

                <!-- EMAIL -->
                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold">
                        Correo Electrónico
                    </label>

                    <div class="input-group input-custom">
                        <span class="input-group-text bg-transparent border-0">
                            <i class="bi bi-envelope"></i>
                        </span>

                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control border-0"
                               placeholder="tu@email.com"
                               required>
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">
                        Contraseña
                    </label>

                    <div class="input-group input-custom">
                        <span class="input-group-text bg-transparent border-0">
                            <i class="bi bi-lock"></i>
                        </span>

                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control border-0"
                               required>

                        <span class="input-group-text bg-transparent border-0">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <!-- RECORDAR + OLVIDÓ -->
                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div class="form-check">
                        <input class="form-check-input"
                               type="checkbox"
                               id="remember"
                               name="remember">
                        <label class="form-check-label" for="remember">
                            Recordarme
                        </label>
                    </div>

                    <a th:href="@{/inicio/forgot-password}"
                       class="text-teal small">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <!-- BOTÓN -->
                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-teal rounded-pill py-3">
                        Iniciar Sesión
                    </button>
                </div>

            </form>

            <!-- MENSAJES -->
            <div class="mt-3">
                <p th:if="${mensaje}"
                   th:text="${mensaje}"
                   class="text-success"></p>

                <p th:if="${error}"
                   th:text="${error}"
                   class="text-danger"></p>
            </div>

            <!-- REGISTRO -->
            <footer class="text-center mt-4">
                <p class="mb-0">
                    ¿No tienes cuenta?
                    <a th:href="@{/inicio/registro}"
                       class="text-teal fw-semibold">
                        Regístrate aquí
                    </a>
                </p>
            </footer>

        </section>

    </div>
</main>

</body>
</html>
