<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Error - Cliente no registrado</title>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Estilos personalizados -->
    <link 
        rel="stylesheet"
        th:href="@{/css/error505.css}">
</head>

<body>

    <!-- Contenedor principal -->
    <div class="container error-container d-flex align-items-center justify-content-center">

        <div class="row align-items-center justify-content-center w-100">

            <!-- Imagen ilustrativa -->
            <div class="col-md-5 text-center">

                <img 
                    src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png"
                    alt="Cliente no encontrado"
                    class="client-img mb-4">

            </div>


            <!-- Tarjeta de error -->
            <div class="col-md-5">

                <div class="error-card text-center">

                    <!-- Título -->
                    <h1 class="error-title">
                        Error 505
                    </h1>

                    <!-- Subtítulo -->
                    <h4 class="error-subtitle mt-3">
                        El cliente no está registrado
                    </h4>

                    <!-- Descripción -->
                    <p class="error-text mt-3">
                        No encontramos el cliente en el sistema.
                        Verifique el ID ingresado o registre un nuevo cliente
                        para continuar.
                    </p>

                    <!-- Botones -->
                    <div class="mt-4">

                        <a 
                            th:href="@{/inicio}"
                            class="btn-custom">
                            Volver al inicio
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
