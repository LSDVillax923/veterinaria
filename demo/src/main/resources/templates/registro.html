<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0f6f67",
                        background: "#ddd1c5"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background min-h-screen flex items-center justify-center">

<!-- CONTENEDOR GENERAL -->
<div class="w-[1100px] max-w-[95%] flex flex-col lg:flex-row rounded-3xl overflow-hidden shadow-xl bg-white">

    <!-- ======================
            LADO IZQUIERDO
    ======================= -->
    <div class="relative hidden lg:block lg:w-1/2">

        <img th:src="@{../img/gato1.jpg}"
             alt="Gato acostado"
             class="w-full h-full object-cover">

        <!-- Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-teal-900/70 to-transparent"></div>

        <!-- Texto -->
        <div class="absolute bottom-10 left-10 text-white">
            <h1 class="text-4xl font-bold mb-2">
                Únete a nuestra familia
            </h1>
            <p class="text-lg text-gray-200">
                Crea tu cuenta y comienza a cuidar mejor de tus mascotas
            </p>
        </div>
    </div>

    <!-- ======================
            LADO DERECHO
    ======================= -->
    <div class="w-full lg:w-1/2 bg-gray-50 p-10">

        <!-- Volver -->
        <a th:href="@{/inicio}"
           class="text-primary font-medium inline-flex items-center gap-2 mb-6">
            ← Volver al inicio
        </a>

        <!-- Título -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-primary">
                Crear Cuenta
            </h2>
            <p class="text-gray-500 mt-2">
                Completa tus datos para registrarte
            </p>
        </div>

        <!-- FORMULARIO -->
        <form th:action="@{/inicio/registro}"
              method="post"
              class="space-y-5">

            <!-- Nombre -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Nombre Completo
                </label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-primary">
                    <span class="text-gray-400 mr-3">👤</span>
                    <input type="text"
                           name="nombre"
                           placeholder="Juan Pérez"
                           class="w-full outline-none bg-transparent"
                           required>
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Correo Electrónico
                </label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-primary">
                    <span class="text-gray-400 mr-3">✉️</span>
                    <input type="email"
                           name="email"
                           placeholder="tu@email.com"
                           class="w-full outline-none bg-transparent"
                           required>
                </div>
            </div>

            <!-- Teléfono -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Teléfono
                </label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-primary">
                    <span class="text-gray-400 mr-3">📞</span>
                    <input type="tel"
                           name="telefono"
                           placeholder="+52 123 456 7890"
                           class="w-full outline-none bg-transparent">
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Contraseña
                </label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-primary">
                    <span class="text-gray-400 mr-3">🔒</span>
                    <input type="password"
                           name="password"
                           class="w-full outline-none bg-transparent"
                           required>
                </div>
            </div>

            <!-- Confirmar -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Confirmar Contraseña
                </label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-primary">
                    <span class="text-gray-400 mr-3">🔒</span>
                    <input type="password"
                           name="confirmar"
                           class="w-full outline-none bg-transparent"
                           required>
                </div>
            </div>

            <!-- Checkbox -->
            <div class="flex items-start gap-2 text-sm text-gray-600">
                <input type="checkbox"
                       name="terminos"
                       class="mt-1 accent-primary"
                       required>
                <span>
                    Acepto los términos y condiciones y la política de privacidad
                </span>
            </div>

            <!-- Botón -->
            <button type="submit"
                    class="w-full bg-primary hover:bg-teal-800 text-white py-4 rounded-full font-semibold shadow-md transition duration-300">
                Crear Cuenta
            </button>

        </form>

        <!-- Login -->
        <p class="text-center text-sm text-gray-600 mt-6">
            ¿Ya tienes cuenta?
            <a th:href="@{/inicio/login}"
               class="text-primary font-semibold hover:underline">
                Inicia sesión aquí
            </a>
        </p>

    </div>

</div>

</body>
</html>
