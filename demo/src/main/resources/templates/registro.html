<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0f6f67",
                        background: "#ddd1c5"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-[1100px] flex flex-col md:flex-row rounded-[2rem] overflow-hidden shadow-2xl bg-white">

    <div class="relative w-full md:w-[45%] h-64 md:h-auto">
        <img th:src="@{../img/gato1.jpg}"
             src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=2043&auto=format&fit=crop" 
             alt="Gato"
             class="absolute inset-0 w-full h-full object-cover object-center">
        
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>

        <div class="absolute bottom-8 left-8 right-8 text-white z-10">
            <h1 class="text-3xl font-bold mb-2">Únete a nuestra familia</h1>
            <p class="text-sm opacity-90">Comienza a cuidar mejor de tus mascotas.</p>
        </div>
    </div>

    <div class="w-full md:w-[55%] bg-white p-8 md:p-10 flex flex-col justify-center">

        <a th:href="@{/inicio}" class="text-primary text-sm font-semibold inline-flex items-center gap-2 mb-6 hover:opacity-75 transition">
            <span>←</span> Volver al inicio
        </a>

        <div class="mb-6">
            <h2 class="text-2xl font-bold text-primary">Crear Cuenta</h2>
            <p class="text-gray-400 text-sm mt-1">Completa tus datos para registrarte</p>
        </div>

        <form th:action="@{/inicio/registro}" method="post" class="space-y-4">

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Nombre Completo</label>
                <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                    <span class="mr-3 text-xs">👤</span>
                    <input type="text" name="nombre" placeholder="Juan Pérez" class="w-full outline-none bg-transparent text-sm" required>
                </div>
            </div>

            <!-- Cédula -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Cédula</label>
                <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                    <span class="mr-3 text-xs">🪪</span>
                    <input type="number" name="cedula" placeholder="1000000001" class="w-full outline-none bg-transparent text-sm" required>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Correo Electrónico</label>
                <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                    <span class="mr-3 text-xs">✉️</span>
                    <input type="email" name="email" placeholder="tu@email.com" class="w-full outline-none bg-transparent text-sm" required>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Teléfono</label>
                <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                    <span class="mr-3 text-xs">📞</span>
                    <input type="tel" name="telefono" placeholder="+52..." class="w-full outline-none bg-transparent text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Contraseña</label>
                    <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                        <input type="password" name="password" placeholder="••••" class="w-full outline-none bg-transparent text-sm" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Confirmar</label>
                    <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                        <input type="password" name="confirmar" placeholder="••••" class="w-full outline-none bg-transparent text-sm" required>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 text-[11px] text-gray-500 pt-1">
                <input type="checkbox" name="terminos" class="w-3.5 h-3.5 accent-primary rounded" required>
                <span>Acepto los términos y condiciones</span>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-[#0a5a54] text-white py-3 rounded-full font-bold text-sm shadow-lg shadow-primary/10 transition-all active:scale-95 mt-2">
                Crear Cuenta
            </button>
        </form>
        <p class="text-center text-xs text-gray-500 mt-6">
            ¿Ya tienes cuenta? <a th:href="@{/inicio/login}" class="text-primary font-bold hover:underline">Inicia sesión</a>
        </p>
    </div>
</div>

</body>
</html>
