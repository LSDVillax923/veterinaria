<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
<div class="container">
  <div class="left">
    <img th:src="@{/img/gato2.jpg}" alt="Gato acostado" class="img">
    <div class="text">
      <h1>Únete a nuestra familia</h1>
      <p>Crea tu cuenta y comienza a cuidar mejor de tus mascotas</p>
    </div>
  </div>
  <div class="right">
    <a th:href="@{/inicio}" class="back">← Volver al inicio</a>
    <h2>Crear Cuenta</h2>
    <p>Completa tus datos para registrarte</p>

    <form th:action="@{/inicio/registro}" method="post">
      <label for="nombre">Nombre Completo</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="email">Correo Electrónico</label>
      <input type="email" id="email" name="email" required>

      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono">

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>

      <label for="confirmar">Confirmar Contraseña</label>
      <input type="password" id="confirmar" name="confirmar" required>

      <label>
        <input type="checkbox" name="terminos" required> Acepto los términos y condiciones
      </label>

      <button type="submit">Crear Cuenta</button>
    </form>

    <p class="login">
      ¿Ya tienes cuenta?
      <a th:href="@{/inicio/login}">Inicia sesión aquí</a>
    </p>
  </div>
</div>
</body>
</html>
