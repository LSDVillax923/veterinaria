<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Mascota</title>
  <link rel="stylesheet" th:href="@{/css/mascotas.css}">
  <link rel="stylesheet" th:href="@{/css/editarMascota.css}">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-container">
    <a th:href="@{/inicio}" class="logo">
      <img th:src="@{/img/Medicat.png}" alt="Medicat logo">
    </a>
    <nav class="nav">
      <a th:href="@{/inicio}" class="nav-link">Inicio</a>
      <a th:href="@{/mascotas}" class="nav-link">Listado de Mascotas</a>
    </nav>
  </div>
</header>

<main class="dashboard">

  <section class="dashboard-header">
    <a th:href="@{/mascotas}" class="btn-volver">← Volver al listado</a>
    <h1 class="dashboard-title">Editar Mascota</h1>
    <p class="dashboard-subtitle">Modifica la información de <span th:text="${mascota.nombre}">la mascota</span></p>
  </section>

  <div class="form-card">
    <form th:action="@{/mascotas/{id}/editar(id=${mascota.id})}" method="post" enctype="multipart/form-data">

      <div class="form-grid">

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" th:value="${mascota.nombre}" required>
        </div>

        <div class="form-group">
          <label for="especie">Especie</label>
          <input type="text" id="especie" name="especie" th:value="${mascota.especie}" required>
        </div>

        <div class="form-group">
          <label for="raza">Raza</label>
          <input type="text" id="raza" name="raza" th:value="${mascota.raza}" required>
        </div>

        <div class="form-group">
          <label for="edad">Edad (años)</label>
          <input type="number" id="edad" name="edad" th:value="${mascota.edad}" min="0" required>
        </div>

        <div class="form-group">
          <label for="peso">Peso (kg)</label>
          <input type="number" id="peso" name="peso" th:value="${mascota.peso}" step="0.1" min="0" required>
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado" name="estado">
            <option th:selected="${mascota.estado == 'Sano'}" value="Sano">Sano</option>
            <option th:selected="${mascota.estado == 'En Tratamiento'}" value="En Tratamiento">En Tratamiento</option>
            <option th:selected="${mascota.estado == 'Requiere Atención'}" value="Requiere Atención">Requiere Atención</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="enfermedad">Enfermedad</label>
          <input type="text" id="enfermedad" name="enfermedad" th:value="${mascota.enfermedad}">
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones" th:text="${mascota.observaciones}"></textarea>
        </div>
         <div class="form-group full-width">
          <label for="fotoFile">Actualizar foto de la mascota</label>
          <input type="file" id="fotoFile" name="fotoFile" accept="image/*">
        </div>

      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
        <a th:href="@{/mascotas}" class="btn-cancelar">✕ Cancelar</a>
      </div>

    </form>
  </div>

</main>

</body>
</html>
