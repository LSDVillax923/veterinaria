<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Cliente</title>
  <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>
<header class="header">
  <div class="header-container">
    <a th:href="@{/inicio}" class="logo">
      <img th:src="@{/img/Medicat.png}" alt="Medicat logo">
    </a>
    <nav class="nav">
      <a th:href="@{/clientes}" class="nav-link">Clientes</a>
      <a th:href="@{/mascotas}" class="nav-link">Mascotas</a>
    </nav>
  </div>
</header>

<main class="dashboard">
  <section class="dashboard-header">
    <a th:href="@{/clientes}" class="btn-volver">← Volver al listado</a>
    <h1 class="dashboard-title">Detalle del Cliente</h1>
  </section>

  <section class="filtros-card">
    <p><strong>ID:</strong> <span th:text="${cliente.id}"></span></p>
    <p><strong>Nombre:</strong> <span th:text="${cliente.nombre + ' ' + cliente.apellido}"></span></p>
    <p><strong>Correo:</strong> <span th:text="${cliente.correo}"></span></p>
    <p><strong>Celular:</strong> <span th:text="${cliente.celular}"></span></p>
    <p><strong>Total de mascotas:</strong> <span th:text="${totalMascotas}"></span></p>
  </section>

  <section class="tabla-card">
    <table class="tabla">
      <thead>
        <tr>
          <th>Mascota</th>
          <th>Especie</th>
          <th>Raza</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(mascotas)}">
          <td colspan="4">Este cliente no tiene mascotas registradas.</td>
        </tr>
        <tr th:each="mascota : ${mascotas}">
          <td th:text="${mascota.nombre}">Firulais</td>
          <td th:text="${mascota.especie}">Perro</td>
          <td th:text="${mascota.raza}">Labrador</td>
          <td th:text="${mascota.estado}">Sano</td>
        </tr>
      </tbody>
    </table>
  </section>
</main>
</body>
</html>
