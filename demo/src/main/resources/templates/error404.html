<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Error 404 - Mascota no encontrada</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/error404.css}">

</head>

<body>

<div class="container error-container d-flex align-items-center justify-content-center">

    <div class="row align-items-center justify-content-center w-100">

        <!-- Imagen -->
        <div class="col-md-5 text-center">

            <img src="https://cdn-icons-png.flaticon.com/512/2138/2138440.png"
                 class="cat-img mb-4">

        </div>

        <!-- Card de error -->
        <div class="col-md-5">

            <div class="error-card text-center">

                <h1 class="error-title">
                    Error 404
                </h1>

                <h4 class="error-subtitle mt-3">
                    La mascota no está registrada
                </h4>

                <p class="error-text mt-3">
                    No encontramos la mascota en el sistema.
                    Verifique el ID ingresado o registre una nueva mascota para continuar.
                </p>

                <div class="mt-4">

                    <a th:href="@{/inicio}" class="btn-custom">
                        Volver al inicio
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
